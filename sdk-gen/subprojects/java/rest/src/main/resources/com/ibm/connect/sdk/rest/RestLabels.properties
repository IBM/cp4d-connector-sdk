REST_CONNECTOR_LABEL = Rest API
REST_CONNECTOR_DESCRIPTION = The REST API Connector enables copying data from RESTful APIs into your system.
API_BASE_URL_LABEL = Base URL
API_BASE_URL_DESCRIPTION = The endpoint base url of the API.
API_SSL_CERTIFICATE_LABEL = SSL certificate
API_SSL_CERTIFICATE_DESCRIPTION = The SSL certificate of the host to be trusted which is only needed when the host certificate was not signed by a known certificate authority
API_AUTH_TYPE_LABEL = Authentication Type
API_AUTH_TYPE_DESCRIPTION = Method used for authenticating REST API requests
API_AUTH_USERNAME_LABEL = Username
API_AUTH_USERNAME_DESCRIPTION = Username used for Basic authentication
API_AUTH_PASSWORD_LABEL = Password
API_AUTH_PASSWORD_DESCRIPTION = Password used for Basic authentication
API_AUTH_OAUTH2_TOKEN_URL_LABEL = Token URL
API_AUTH_OAUTH2_TOKEN_URL_DESCRIPTION = The OAuth 2.0 endpoint used to obtain an access token using the Client Credentials grant.
API_AUTH_OAUTH2_CLIENT_ID_LABEL = Client ID
API_AUTH_OAUTH2_CLIENT_ID_DESCRIPTION = The unique identifier issued to your application by the authorization server.
API_AUTH_OAUTH2_CLIENT_SECRET_LABEL = Client Secret
API_AUTH_OAUTH2_CLIENT_SECRET_DESCRIPTION = The confidential secret associated with the Client ID. Used for authentication when requesting tokens.
API_AUTH_OAUTH2_SCOPE_LABEL = Scopes
API_AUTH_OAUTH2_SCOPE_DESCRIPTION = Space-separated list of scopes defining the permissions your token should have. Some APIs may require it.

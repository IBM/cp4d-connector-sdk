API_AUTH_OAUTH2_GRANT_TYPE_DESCRIPTION = Specifies the OAuth 2.0 grant type used to obtain an access token.
API_AUTH_OAUTH2_GRANT_TYPE_CLIENT_CREDENTIALS_LABEL = Client Credentials
API_AUTH_OAUTH2_GRANT_TYPE_REFRESH_TOKEN_LABEL = Refresh Token

SOURCE_FILE_NAME_LABEL = 檔名
SOURCE_FILE_NAME_DESCRIPTION = 要讀取的檔案路徑
SOURCE_FILE_FORMAT_LABEL = 檔案格式
SOURCE_FILE_FORMAT_DESCRIPTION = 檔案格式
SOURCE_FILE_FORMAT_VALUE_AVRO_LABEL = Avro
SOURCE_FILE_FORMAT_VALUE_CSV_LABEL = CSV
SOURCE_FILE_FORMAT_VALUE_DELIMITED_LABEL = 分隔
SOURCE_FILE_FORMAT_VALUE_JSON_LABEL = JSON
SOURCE_FILE_FORMAT_VALUE_ORC_LABEL = ORC
SOURCE_FILE_FORMAT_VALUE_PARQUET_LABEL = Parquet
SOURCE_FILE_FORMAT_VALUE_XML_LABEL = XML
SOURCE_ROW_LIMIT_LABEL = 列限制
SOURCE_ROW_LIMIT_DESCRIPTION = 要傳回的列數目上限。
SOURCE_BYTE_LIMIT_LABEL = 位元組限制
SOURCE_BYTE_LIMIT_DESCRIPTION = 要傳回的位元組數目上限。 請使用以下任何字尾；KB、MB、GB 或 TB
SOURCE_COMMENT_CHARACTER_VALUE_LABEL = 註解字元值
SOURCE_COMMENT_CHARACTER_VALUE_DESCRIPTION = 用於跳過以此字元開頭的行的單一字元
SOURCE_DATE_FORMAT_LABEL = 日期格式
SOURCE_DATE_FORMAT_DESCRIPTION = 日期值的格式，例如 yyyy-MM-dd
SOURCE_ENCODING_LABEL = 編碼
SOURCE_ENCODING_DESCRIPTION = 資料的適當字元編碼，例如，UTF-8
SOURCE_ESCAPE_CHARACTER_VALUE_LABEL = 跳出字元值
SOURCE_ESCAPE_CHARACTER_VALUE_DESCRIPTION = 用來跳出其他字元的自訂字元。
SOURCE_FIELD_DELIMITER_VALUE_LABEL = 欄位定界字元值
SOURCE_FIELD_DELIMITER_VALUE_DESCRIPTION = 將每一個值與下一個值進行區隔的自訂字元
SOURCE_FIRST_LINE_HEADER_LABEL = 第一行為標頭
SOURCE_FIRST_LINE_HEADER_DESCRIPTION = 指出讀數開始的列是否為標頭
SOURCE_INFER_SCHEMA_LABEL = 推斷綱目
SOURCE_INFER_SCHEMA_DESCRIPTION = 從檔案取得綱目
SOURCE_NAN_VALUE_LABEL = NaN 價值
SOURCE_NAN_VALUE_DESCRIPTION = 例如，非數值的表示、 NaN
SOURCE_NEGATIVE_INFINITY_VALUE_LABEL = 負無限值
SOURCE_NEGATIVE_INFINITY_VALUE_DESCRIPTION = 負無窮數值的表示，例如 -Inf
SOURCE_NULL_VALUE_LABEL = 虛無假設值
SOURCE_NULL_VALUE_DESCRIPTION = 代表檔案中的空值（遺漏值）的值，例如，NULL
SOURCE_POSITIVE_INFINITY_VALUE_LABEL = 正無限值
SOURCE_POSITIVE_INFINITY_VALUE_DESCRIPTION = 正無限值的表示，例如 Inf
SOURCE_QUOTE_CHARACTER_VALUE_LABEL = 引號字元
SOURCE_QUOTE_CHARACTER_VALUE_DESCRIPTION = 用來含括字串值的字元，例如，雙引號
SOURCE_ROW_DELIMITER_VALUE_LABEL = 列定界字元值
SOURCE_ROW_DELIMITER_VALUE_DESCRIPTION = 將每一列與下一列分隔的自訂字串。
SOURCE_TIME_ZONE_FORMAT_LABEL = 時區格式
SOURCE_TIME_ZONE_FORMAT_DESCRIPTION = 時區值的格式，例如：yyyy-MM-dd HH:mm:ss.SSS XXX
SOURCE_TIMESTAMP_FORMAT_LABEL = 時間戳記格式
SOURCE_TIMESTAMP_FORMAT_DESCRIPTION = 時間戳值的格式，例如 yyyy-MM-dd HH:mm:ss[.SSS]
SOURCE_ROW_TAG_LABEL = 行標籤
SOURCE_ROW_TAG_DESCRIPTION = 識別每一行的 XML 元素名稱。 預設為 ROW。

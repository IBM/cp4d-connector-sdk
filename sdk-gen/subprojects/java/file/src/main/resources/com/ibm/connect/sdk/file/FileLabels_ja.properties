SOURCE_FILE_NAME_LABEL = ファイル名
SOURCE_FILE_NAME_DESCRIPTION = 読み込むファイルのパス
SOURCE_FILE_FORMAT_LABEL = ファイル形式
SOURCE_FILE_FORMAT_DESCRIPTION = ファイルのフォーマット
SOURCE_FILE_FORMAT_VALUE_AVRO_LABEL = Avro
SOURCE_FILE_FORMAT_VALUE_CSV_LABEL = CSV
SOURCE_FILE_FORMAT_VALUE_DELIMITED_LABEL = 区切り形式
SOURCE_FILE_FORMAT_VALUE_JSON_LABEL = JSON
SOURCE_FILE_FORMAT_VALUE_ORC_LABEL = ORC
SOURCE_FILE_FORMAT_VALUE_PARQUET_LABEL = Parquet
SOURCE_FILE_FORMAT_VALUE_XML_LABEL = XML
SOURCE_ROW_LIMIT_LABEL = 最大行数
SOURCE_ROW_LIMIT_DESCRIPTION = 返される行の最大数
SOURCE_BYTE_LIMIT_LABEL = バイトの制限
SOURCE_BYTE_LIMIT_DESCRIPTION = 返されるバイトの最大数。 接尾部に KB、MB、GB、または TB を使用します。
SOURCE_COMMENT_CHARACTER_VALUE_LABEL = コメント文字の値
SOURCE_COMMENT_CHARACTER_VALUE_DESCRIPTION = この文字で始まる行をスキップするための1文字
SOURCE_DATE_FORMAT_LABEL = 日付の形式
SOURCE_DATE_FORMAT_DESCRIPTION = 日付の値のフォーマット、例えば yyyy-MM-dd
SOURCE_ENCODING_LABEL = Encoding
SOURCE_ENCODING_DESCRIPTION = データの適切な文字エンコード (例: UTF-8)
SOURCE_ESCAPE_CHARACTER_VALUE_LABEL = エスケープ文字の値
SOURCE_ESCAPE_CHARACTER_VALUE_DESCRIPTION = 他の文字をエスケープするために使用されるカスタム文字。
SOURCE_FIELD_DELIMITER_VALUE_LABEL = フィールド区切り文字の値
SOURCE_FIELD_DELIMITER_VALUE_DESCRIPTION = 各値を次の値から分離するカスタム文字
SOURCE_FIRST_LINE_HEADER_LABEL = 最初の行はヘッダーです
SOURCE_FIRST_LINE_HEADER_DESCRIPTION = 読み取りが開始される行がヘッダーであるかどうかを示す
SOURCE_INFER_SCHEMA_LABEL = スキーマを推論する
SOURCE_INFER_SCHEMA_DESCRIPTION = ファイルからスキーマを取得します
SOURCE_NAN_VALUE_LABEL = NaN 価値
SOURCE_NAN_VALUE_DESCRIPTION = 例えば、数値以外の値の表現、 NaN
SOURCE_NEGATIVE_INFINITY_VALUE_LABEL = 負の無限大値
SOURCE_NEGATIVE_INFINITY_VALUE_DESCRIPTION = 負の無限大の値の表現、例えば-Inf
SOURCE_NULL_VALUE_LABEL = NULL 値
SOURCE_NULL_VALUE_DESCRIPTION = ファイル内でヌル (欠損値) を表す値 (例: NULL)
SOURCE_POSITIVE_INFINITY_VALUE_LABEL = 正の無限大の値
SOURCE_POSITIVE_INFINITY_VALUE_DESCRIPTION = 正の無限大の値の表現、例えば、Inf
SOURCE_QUOTE_CHARACTER_VALUE_LABEL = 引用文字
SOURCE_QUOTE_CHARACTER_VALUE_DESCRIPTION = ストリング値を囲むために使用される文字 (例えば、二重引用符)
SOURCE_ROW_DELIMITER_VALUE_LABEL = 行区切り文字の値
SOURCE_ROW_DELIMITER_VALUE_DESCRIPTION = 各行を次の行と区切るカスタム文字列。
SOURCE_TIME_ZONE_FORMAT_LABEL = タイムゾーン形式
SOURCE_TIME_ZONE_FORMAT_DESCRIPTION = タイムゾーン値のフォーマット、例えば yyyy-MM-dd HH:mm:ss.SSS XXX
SOURCE_TIMESTAMP_FORMAT_LABEL = タイム・スタンプ形式
SOURCE_TIMESTAMP_FORMAT_DESCRIPTION = タイムスタンプ値のフォーマット、例えばyyyy-MM-dd HH:mm:ss[.SSS]
SOURCE_ROW_TAG_LABEL = 行タグ
SOURCE_ROW_TAG_DESCRIPTION = 各行を識別するXML要素の名前。 デフォルトはROW。

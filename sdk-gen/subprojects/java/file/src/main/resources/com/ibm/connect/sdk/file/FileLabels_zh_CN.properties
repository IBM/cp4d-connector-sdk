SOURCE_NULL_VALUE_LABEL = 空值
SOURCE_NULL_VALUE_DESCRIPTION = 代表文件中空值（缺失值）的值，例如 NULL
SOURCE_POSITIVE_INFINITY_VALUE_LABEL = 正无穷大值
SOURCE_POSITIVE_INFINITY_VALUE_DESCRIPTION = 正无穷大值的表示方法，例如 Inf
SOURCE_QUOTE_CHARACTER_VALUE_LABEL = 引号字符
SOURCE_QUOTE_CHARACTER_VALUE_DESCRIPTION = 用于括住字符串值的字符，例如双引号

SOURCE_FILE_NAME_LABEL = 파일 이름
SOURCE_FILE_NAME_DESCRIPTION = 읽을 파일의 경로
SOURCE_FILE_FORMAT_LABEL = 파일 형식
SOURCE_FILE_FORMAT_DESCRIPTION = 파일의 형식입니다.
SOURCE_FILE_FORMAT_VALUE_AVRO_LABEL = Avro
SOURCE_FILE_FORMAT_VALUE_CSV_LABEL = CSV
SOURCE_FILE_FORMAT_VALUE_DELIMITED_LABEL = 구분
SOURCE_FILE_FORMAT_VALUE_JSON_LABEL = JSON
SOURCE_FILE_FORMAT_VALUE_ORC_LABEL = ORC
SOURCE_FILE_FORMAT_VALUE_PARQUET_LABEL = Parquet
SOURCE_FILE_FORMAT_VALUE_XML_LABEL = XML
SOURCE_ROW_LIMIT_LABEL = 행 한계
SOURCE_ROW_LIMIT_DESCRIPTION = 리턴할 최대 행 수입니다.
SOURCE_BYTE_LIMIT_LABEL = 바이트 한계
SOURCE_BYTE_LIMIT_DESCRIPTION = 리턴할 최대 바이트 수입니다. 접미어 KB, MB, GB 또는 TB를 사용하십시오.
SOURCE_COMMENT_CHARACTER_VALUE_LABEL = 댓글 문자 값
SOURCE_COMMENT_CHARACTER_VALUE_DESCRIPTION = 이 문자로 시작하는 줄 건너뛰기에 사용되는 단일 문자
SOURCE_DATE_FORMAT_LABEL = 날짜 형식
SOURCE_DATE_FORMAT_DESCRIPTION = 날짜 값의 형식(예: yyyy-MM-dd)
SOURCE_ENCODING_LABEL = 인코딩
SOURCE_ENCODING_DESCRIPTION = 데이터에 적절한 문자 인코딩(예: UTF-8)
SOURCE_ESCAPE_CHARACTER_VALUE_LABEL = 이스케이프 문자 값
SOURCE_ESCAPE_CHARACTER_VALUE_DESCRIPTION = 다른 문자를 이스케이프시키는 데 사용되는 사용자 정의 문자입니다.
SOURCE_FIELD_DELIMITER_VALUE_LABEL = 필드 구분 기호 값
SOURCE_FIELD_DELIMITER_VALUE_DESCRIPTION = 각 값을 다음 값과 구분하는 사용자 정의 문자
SOURCE_FIRST_LINE_HEADER_LABEL = 첫 번째 행은 헤더임
SOURCE_FIRST_LINE_HEADER_DESCRIPTION = 읽기가 시작되는 행이 머리글인지 여부를 표시합니다.
SOURCE_INFER_SCHEMA_LABEL = 스키마 추정
SOURCE_INFER_SCHEMA_DESCRIPTION = 스키마를 파일에서 얻음
SOURCE_NAN_VALUE_LABEL = NaN 값
SOURCE_NAN_VALUE_DESCRIPTION = 예를 들어 숫자가 아닌 값의 표현입니다, NaN
SOURCE_NEGATIVE_INFINITY_VALUE_LABEL = 음의 무한대 값
SOURCE_NEGATIVE_INFINITY_VALUE_DESCRIPTION = 음의 무한대 값의 표현(예: -Inf
SOURCE_NULL_VALUE_LABEL = 널값
SOURCE_NULL_VALUE_DESCRIPTION = 파일에서 널(누락된 값)을 나타내는 값(예: NULL)
SOURCE_POSITIVE_INFINITY_VALUE_LABEL = 양수 무한대 값
SOURCE_POSITIVE_INFINITY_VALUE_DESCRIPTION = 양수 무한대 값의 표현(예: Inf
SOURCE_QUOTE_CHARACTER_VALUE_LABEL = 인용 문자
SOURCE_QUOTE_CHARACTER_VALUE_DESCRIPTION = 문자열 값을 묶는 데 사용되는 문자입니다(예: 큰따옴표).
SOURCE_ROW_DELIMITER_VALUE_LABEL = 행 구분 기호 값
SOURCE_ROW_DELIMITER_VALUE_DESCRIPTION = 각 행을 다음 행과 구분하는 사용자 정의 문자열입니다.
SOURCE_TIME_ZONE_FORMAT_LABEL = 시간대 형식
SOURCE_TIME_ZONE_FORMAT_DESCRIPTION = 시간대 값의 형식(예: yyyy-MM-dd HH:mm:ss.SSS XXX)
SOURCE_TIMESTAMP_FORMAT_LABEL = 시간소인 형식
SOURCE_TIMESTAMP_FORMAT_DESCRIPTION = 타임스탬프 값의 형식(예: yyyy-MM-dd HH:mm:ss[.SSS])
SOURCE_ROW_TAG_LABEL = 행 태그
SOURCE_ROW_TAG_DESCRIPTION = 각 행을 식별하는 XML 요소의 이름입니다. 기본값은 ROW입니다.

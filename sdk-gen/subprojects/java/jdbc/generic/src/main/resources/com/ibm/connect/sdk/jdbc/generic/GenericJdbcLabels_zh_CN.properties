DATASOURCE_TYPE_LABEL = 通用 JDBC （定制）
DATASOURCE_TYPE_DESCRIPTION = 通用的自定义连接类型 JDBC
CONNECTION_JDBC_URL_LABEL = JDBC URL
CONNECTION_JDBC_URL_DESCRIPTION = 用于连接到数据库的 JDBC URL。 要了解 URL 的语法，请参阅 JDBC Driver 文档
CONNECTION_JDBC_PROPERTIES_LABEL = JDBC 属性
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = 用于连接到数据库的 JDBC 属性（多行“键=值”格式）。 要了解受支持的属性值，请参阅 JDBC Driver 文档
CONNECTION_USERNAME_LABEL = 用户名
CONNECTION_USERNAME_DESCRIPTION = 用户名
CONNECTION_PASSWORD_LABEL = 密码
CONNECTION_PASSWORD_DESCRIPTION = 密码
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = 行限制支持
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = 指出 Driver 是否支持 SELECT 语句中的行限制
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = 无
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = 前缀
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = 后缀
CONNECTION_ROW_LIMIT_PREFIX_LABEL = 行限制前缀
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = 要在 SELECT 语句中使用的前缀，用于指出 row_limit_support 为 prefix 时的行限制。 使用 ${row_limit} 指示将行限制值放在何处
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = 行限制后缀
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = 要在 SELECT 语句中使用的后缀，用于指出 row_limit_support 为 suffix 时的行限制。 使用 ${row_limit} 指示将行限制值放在何处
CONNECTION_SSL_CERTIFICATE_LABEL = SSL 证书
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = 要信任的主机的 SSL 证书，仅当已知认证中心未对主机证书进行签名时才需要此证书
SOURCE_SCHEMA_NAME_LABEL = 模式名称
SOURCE_SCHEMA_NAME_DESCRIPTION = 要读取的表所在模式的名称
SOURCE_TABLE_NAME_LABEL = 表名
SOURCE_TABLE_NAME_DESCRIPTION = 要读取的表的名称
SOURCE_ROW_LIMIT_LABEL = 行限制
SOURCE_ROW_LIMIT_DESCRIPTION = 要返回的最大行数
SOURCE_BYTE_LIMIT_LABEL = 字节限制
SOURCE_BYTE_LIMIT_DESCRIPTION = 要返回的最大字节数。 使用以下任何后缀：KB、MB、GB 或 TB
SOURCE_SELECT_STATEMENT_LABEL = SELECT 语句
SOURCE_SELECT_STATEMENT_DESCRIPTION = 用于从表中检索数据的 SQL SELECT 语句
TARGET_SCHEMA_NAME_LABEL = 模式名称
TARGET_SCHEMA_NAME_DESCRIPTION = 要写入的表所在模式的名称
TARGET_TABLE_NAME_LABEL = 表名
TARGET_TABLE_NAME_DESCRIPTION = 要写入的表的名称
TARGET_WRITE_MODE_LABEL = 写方式
TARGET_WRITE_MODE_DESCRIPTION = 将记录写入目标表的方式
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = 插入
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = 更新
TARGET_WRITE_MODE_VALUE_UPDATE_STATEMENT_LABEL = UPDATE 语句
TARGET_WRITE_MODE_VALUE_STATIC_STATEMENT_LABEL = 静态语句
TARGET_KEY_COLUMN_NAMES_LABEL = 键列名
TARGET_KEY_COLUMN_NAMES_DESCRIPTION = 以逗号分隔的列名列表，用于覆盖更新或合并期间使用的主键
TARGET_UPDATE_STATEMENT_LABEL = UPDATE 语句
TARGET_UPDATE_STATEMENT_DESCRIPTION = 用于更新表中数据的 SQL INSERT、UPDATE、MERGE 或 DELETE 语句
TARGET_TABLE_ACTION_LABEL = 表操作
TARGET_TABLE_ACTION_DESCRIPTION = 要对目标表执行的操作，用于处理新数据集
TARGET_TABLE_ACTION_VALUE_APPEND_LABEL = 附加
TARGET_TABLE_ACTION_VALUE_REPLACE_LABEL = 替换
TARGET_TABLE_ACTION_VALUE_TRUNCATE_LABEL = 截断
TARGET_CREATE_STATEMENT_LABEL = CREATE 语句
TARGET_CREATE_STATEMENT_DESCRIPTION = 创建目标表的创建 DDL 语句
FILTER_INCLUDE_SYSTEM_LABEL = 包括系统
FILTER_INCLUDE_SYSTEM_DESCRIPTION = 是否包括系统对象
FILTER_INCLUDE_TABLE_LABEL = 包含表
FILTER_INCLUDE_TABLE_DESCRIPTION = 是否包括表
FILTER_INCLUDE_VIEW_LABEL = 包含视图
FILTER_INCLUDE_VIEW_DESCRIPTION = 是否包括视图
FILTER_NAME_PATTERN_LABEL = 名称模式
FILTER_NAME_PATTERN_DESCRIPTION = 过滤所依据的名称模式
FILTER_PRIMARY_KEY_LABEL = 包括主键列表
FILTER_PRIMARY_KEY_DESCRIPTION = 是否包括一列主键
FILTER_SCHEMA_NAME_PATTERN_LABEL = 模式名称模式
FILTER_SCHEMA_NAME_PATTERN_DESCRIPTION = 用于模式过滤的名称模式
ASSET_TYPE_SCHEMA_LABEL = 模式
ASSET_TYPE_TABLE_LABEL = 表
ASSET_TYPE_PRIMARY_KEY_LABEL = 主键
ACTION_GET_RECORD_COUNT_DESCRIPTION = 获取所指定表中的行数
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = 模式名称
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = 包含表的模式的名称
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_LABEL = 表名
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_DESCRIPTION = 要获取行数的表的名称
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_LABEL = 记录计数
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_DESCRIPTION = 可用行数

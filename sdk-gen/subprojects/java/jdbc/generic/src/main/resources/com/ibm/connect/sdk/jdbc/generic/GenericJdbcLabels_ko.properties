DATASOURCE_TYPE_LABEL = 일반 JDBC (사용자 지정)
DATASOURCE_TYPE_DESCRIPTION = 일반용 사용자 지정 연결 유형 JDBC
CONNECTION_JDBC_URL_LABEL = JDBC URL
CONNECTION_JDBC_URL_DESCRIPTION = 데이터베이스에 연결하는 데 사용되는 JDBC URL입니다. 이 URL의 구문에 대해서는 JDBC 드라이버 문서를 참조하십시오.
CONNECTION_JDBC_PROPERTIES_LABEL = JDBC 특성
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = 데이터베이스에 연결하는 데 사용되는 JDBC 특성입니다(여러 행의 키=값 형식). 지원되는 특성 값은 JDBC 드라이버 문서를 참조하십시오.
CONNECTION_USERNAME_LABEL = 사용자 이름
CONNECTION_USERNAME_DESCRIPTION = 사용자 이름
CONNECTION_PASSWORD_LABEL = 비밀번호
CONNECTION_PASSWORD_DESCRIPTION = 비밀번호
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = 행 제한 지원
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = 드라이버가 선택 명령문에서 행 한계를 지원하는지를 나타냄
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = 없음
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = 접두부
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = 접미부
CONNECTION_ROW_LIMIT_PREFIX_LABEL = 행 제한 접두부
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = row_limit_support가 접두어인 경우 행 한계를 나타내기 위해 선택 명령문에서 사용되는 접두어입니다. 행 한계 값을 삽입할 위치를 표시하려면 ${row_limit}을(를) 사용하십시오.
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = 행 제한 접미부
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = row_limit_support가 접미어인 경우 행 한계를 나타내기 위해 선택 명령문에서 사용되는 접미어입니다. 행 한계 값을 삽입할 위치를 표시하려면 ${row_limit}을(를) 사용하십시오.
CONNECTION_SSL_CERTIFICATE_LABEL = SSL 인증서
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = 호스트 인증서에 알려진 인증 기관의 서명이 없는 경우에만 필요한 신뢰할 수 있는 호스트의 SSL 인증서
SOURCE_SCHEMA_NAME_LABEL = 스키마 이름
SOURCE_SCHEMA_NAME_DESCRIPTION = 읽을 테이블을 포함하는 스키마의 이름
SOURCE_TABLE_NAME_LABEL = 테이블 이름
SOURCE_TABLE_NAME_DESCRIPTION = 읽을 테이블의 이름
SOURCE_ROW_LIMIT_LABEL = 행 한계
SOURCE_ROW_LIMIT_DESCRIPTION = 리턴할 최대 행 수입니다.
SOURCE_BYTE_LIMIT_LABEL = 바이트 한계
SOURCE_BYTE_LIMIT_DESCRIPTION = 리턴할 최대 바이트 수입니다. 접미어 KB, MB, GB 또는 TB를 사용하십시오.
SOURCE_SELECT_STATEMENT_LABEL = 선택 명령문
SOURCE_SELECT_STATEMENT_DESCRIPTION = 테이블에서 데이터를 검색하는 데 필요한 SQL SELECT문
TARGET_SCHEMA_NAME_LABEL = 스키마 이름
TARGET_SCHEMA_NAME_DESCRIPTION = 쓸 테이블을 포함하는 스키마의 이름
TARGET_TABLE_NAME_LABEL = 테이블 이름
TARGET_TABLE_NAME_DESCRIPTION = 쓸 테이블의 이름
TARGET_WRITE_MODE_LABEL = 쓰기 모드
TARGET_WRITE_MODE_DESCRIPTION = 대상 테이블에 레코드를 쓰는 모드입니다.
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = 삽입
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = 업데이트
TARGET_WRITE_MODE_VALUE_UPDATE_STATEMENT_LABEL = 업데이트 명령문
TARGET_WRITE_MODE_VALUE_STATIC_STATEMENT_LABEL = 정적 명령문
TARGET_KEY_COLUMN_NAMES_LABEL = 키 열 이름
TARGET_KEY_COLUMN_NAMES_DESCRIPTION = 업데이트 또는 병합 중에 사용되는 기본 키를 재정의하는 데 필요한, 열 이름의 쉼표로 구분된 목록
TARGET_UPDATE_STATEMENT_LABEL = 업데이트 명령문
TARGET_UPDATE_STATEMENT_DESCRIPTION = 테이블의 데이터를 업데이트하기 위한 SQL INSERT, UPDATE, MERGE 또는 DELETE 문
TARGET_TABLE_ACTION_LABEL = 테이블 조치
TARGET_TABLE_ACTION_DESCRIPTION = 새 데이터 세트를 처리하기 위해 대상 테이블에서 수행하는 조치입니다.
TARGET_TABLE_ACTION_VALUE_APPEND_LABEL = 추가
TARGET_TABLE_ACTION_VALUE_REPLACE_LABEL = 대체
TARGET_TABLE_ACTION_VALUE_TRUNCATE_LABEL = 절단
TARGET_CREATE_STATEMENT_LABEL = 작성 명령문
TARGET_CREATE_STATEMENT_DESCRIPTION = 대상 테이블 생성을 위한 Create DDL 문
FILTER_INCLUDE_SYSTEM_LABEL = 시스템 포함
FILTER_INCLUDE_SYSTEM_DESCRIPTION = 시스템 오브젝트의 포함 여부
FILTER_INCLUDE_TABLE_LABEL = 테이블 포함
FILTER_INCLUDE_TABLE_DESCRIPTION = 테이블 포함 여부
FILTER_INCLUDE_VIEW_LABEL = 보기 포함
FILTER_INCLUDE_VIEW_DESCRIPTION = 뷰 포함 여부
FILTER_NAME_PATTERN_LABEL = 이름 패턴
FILTER_NAME_PATTERN_DESCRIPTION = 필터링할 이름 패턴
FILTER_PRIMARY_KEY_LABEL = 기본 키 목록 포함
FILTER_PRIMARY_KEY_DESCRIPTION = 기본 키 목록의 포함 여부
FILTER_SCHEMA_NAME_PATTERN_LABEL = 스키마 이름 패턴
FILTER_SCHEMA_NAME_PATTERN_DESCRIPTION = 스키마 필터링을 위한 이름 패턴
ASSET_TYPE_SCHEMA_LABEL = 스키마
ASSET_TYPE_TABLE_LABEL = 테이블
ASSET_TYPE_PRIMARY_KEY_LABEL = 기본 키
ACTION_GET_RECORD_COUNT_DESCRIPTION = 지정된 테이블에 있는 행의 수 얻기
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = 스키마 이름
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = 테이블이 포함된 스키마의 이름입니다.
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_LABEL = 테이블 이름
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_DESCRIPTION = 행의 수를 얻을 테이블의 이름
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_LABEL = 레코드 개수
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_DESCRIPTION = 사용 가능한 행의 수

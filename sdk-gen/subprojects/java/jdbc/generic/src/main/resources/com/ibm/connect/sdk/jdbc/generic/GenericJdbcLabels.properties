CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = Suffix
CONNECTION_ROW_LIMIT_PREFIX_LABEL = Row limit prefix
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = Prefix to use in a select statement to indicate a row limit when row_limit_support is prefix. Use ${row_limit} to indicate where to put the row limit value
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = Row limit suffix

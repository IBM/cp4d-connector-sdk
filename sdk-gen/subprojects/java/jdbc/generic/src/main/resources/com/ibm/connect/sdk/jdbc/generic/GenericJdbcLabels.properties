CONNECTION_JDBC_PROPERTIES_LABEL = JDBC properties
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = The JDBC properties used to connect to the database (multi-line key=value format). See the JDBC driver documentation for supported property values
CONNECTION_USERNAME_LABEL = User name

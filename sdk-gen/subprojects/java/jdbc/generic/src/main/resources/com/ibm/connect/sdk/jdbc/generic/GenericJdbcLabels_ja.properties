DATASOURCE_TYPE_LABEL = 汎用 JDBC （カスタム）
DATASOURCE_TYPE_DESCRIPTION = 汎用のカスタム接続タイプ JDBC
CONNECTION_JDBC_URL_LABEL = JDBC URL
CONNECTION_JDBC_URL_DESCRIPTION = データベースへの接続に使用する JDBC URL。 URL の構文については、JDBC ドライバーの資料を参照してください
CONNECTION_JDBC_PROPERTIES_LABEL = JDBC プロパティー
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = データベースへの接続に使用する JDBC プロパティー (multi-line key=value 形式)。 サポートされるプロパティー値については、JDBC ドライバーの資料を参照してください
CONNECTION_USERNAME_LABEL = ユーザー名
CONNECTION_USERNAME_DESCRIPTION = ユーザー名
CONNECTION_PASSWORD_LABEL = パスワード
CONNECTION_PASSWORD_DESCRIPTION = パスワード
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = 行制限のサポート
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = ドライバーが SELECT ステートメントの行の制限をサポートするかどうかを示します
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = なし
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = 接頭部
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = 接尾部
CONNECTION_ROW_LIMIT_PREFIX_LABEL = 行制限の接頭部
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = row_limit_support が接頭部のときの行制限を示すために、SELECT ステートメントで使用する接頭部。 行制限値の配置場所を示すには、${row_limit} を使用します
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = 行制限の接尾部
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = row_limit_support が接尾部のときの行制限を示すために、SELECT ステートメントで使用する接尾部。 行制限値の配置場所を示すには、${row_limit} を使用します
CONNECTION_SSL_CERTIFICATE_LABEL = SSL認証
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = 信頼されるホストのSSL証明書は、ホスト証明書が既知の認証局によって、署名されていない場合にのみ必要です
SOURCE_SCHEMA_NAME_LABEL = スキーマ名
SOURCE_SCHEMA_NAME_DESCRIPTION = 読み取り元の表を含むスキーマの名前
SOURCE_TABLE_NAME_LABEL = テーブル名
SOURCE_TABLE_NAME_DESCRIPTION = 読み取り元の表の名前
SOURCE_ROW_LIMIT_LABEL = 最大行数
SOURCE_ROW_LIMIT_DESCRIPTION = 返される行の最大数
SOURCE_BYTE_LIMIT_LABEL = バイトの制限
SOURCE_BYTE_LIMIT_DESCRIPTION = 返されるバイトの最大数。 接尾部に KB、MB、GB、または TB を使用します。
SOURCE_SELECT_STATEMENT_LABEL = SELECT ステートメント
SOURCE_SELECT_STATEMENT_DESCRIPTION = 表からデータを取得するための SQL SELECT ステートメント
TARGET_SCHEMA_NAME_LABEL = スキーマ名
TARGET_SCHEMA_NAME_DESCRIPTION = 書き込み先の表を含むスキーマの名前
TARGET_TABLE_NAME_LABEL = テーブル名
TARGET_TABLE_NAME_DESCRIPTION = 書き込み先の表の名前
TARGET_WRITE_MODE_LABEL = 書き込みモード
TARGET_WRITE_MODE_DESCRIPTION = ターゲット表にレコードを書き込むモード
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = 挿入
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = Update
TARGET_WRITE_MODE_VALUE_UPDATE_STATEMENT_LABEL = UPDATE ステートメント
TARGET_WRITE_MODE_VALUE_STATIC_STATEMENT_LABEL = 静的ステートメント
TARGET_KEY_COLUMN_NAMES_LABEL = キー列の名
TARGET_KEY_COLUMN_NAMES_DESCRIPTION = 更新時またはマージ時に使用された主キーをオーバーライドする列名のコンマ区切りリスト
TARGET_UPDATE_STATEMENT_LABEL = UPDATE ステートメント
TARGET_UPDATE_STATEMENT_DESCRIPTION = テーブルのデータを更新する SQL INSERT、UPDATE、MERGE、または DELETE 文
TARGET_TABLE_ACTION_LABEL = 表の操作
TARGET_TABLE_ACTION_DESCRIPTION = 新規データ・セットを処理するためにターゲット表で実行するアクション
TARGET_TABLE_ACTION_VALUE_APPEND_LABEL = 追加
TARGET_TABLE_ACTION_VALUE_REPLACE_LABEL = Replace
TARGET_TABLE_ACTION_VALUE_TRUNCATE_LABEL = 切り捨て
TARGET_CREATE_STATEMENT_LABEL = ステートメントを作成します
TARGET_CREATE_STATEMENT_DESCRIPTION = ターゲット・テーブルを作成するCreate DDL文
FILTER_INCLUDE_SYSTEM_LABEL = システムを含める
FILTER_INCLUDE_SYSTEM_DESCRIPTION = システム・オブジェクトを含めるかどうか
FILTER_INCLUDE_TABLE_LABEL = 表を含める
FILTER_INCLUDE_TABLE_DESCRIPTION = 表を含めるかどうか
FILTER_INCLUDE_VIEW_LABEL = ビューを含める
FILTER_INCLUDE_VIEW_DESCRIPTION = ビューを含めるかどうか
FILTER_NAME_PATTERN_LABEL = 名前パターン
FILTER_NAME_PATTERN_DESCRIPTION = フィルタリング対象の名前パターン
FILTER_PRIMARY_KEY_LABEL = 主キーのリストを含む
FILTER_PRIMARY_KEY_DESCRIPTION = 主キーのリストを含めるかどうか
FILTER_SCHEMA_NAME_PATTERN_LABEL = スキーマ名パターン
FILTER_SCHEMA_NAME_PATTERN_DESCRIPTION = スキーマ・フィルタリングのための名前パターン
ASSET_TYPE_SCHEMA_LABEL = スキーマ
ASSET_TYPE_TABLE_LABEL = 表
ASSET_TYPE_PRIMARY_KEY_LABEL = プライマリー・キー
ACTION_GET_RECORD_COUNT_DESCRIPTION = 指定された表内の行数を取得します
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = スキーマ名
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = 表を含むスキーマの名前
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_LABEL = テーブル名
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_DESCRIPTION = 行数を取得する対象の表の名前
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_LABEL = レコード数
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_DESCRIPTION = 使用可能な行の数

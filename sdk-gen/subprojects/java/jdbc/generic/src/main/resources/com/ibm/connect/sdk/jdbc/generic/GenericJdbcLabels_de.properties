TARGET_SCHEMA_NAME_DESCRIPTION = Der Name des Schemas, das die Tabelle enthält, in die geschrieben werden soll
TARGET_TABLE_NAME_LABEL = Tabellenname
TARGET_TABLE_NAME_DESCRIPTION = Der Name der Tabelle, in die geschrieben werden soll

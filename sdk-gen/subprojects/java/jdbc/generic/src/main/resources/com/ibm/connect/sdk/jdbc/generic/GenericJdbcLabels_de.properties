DATASOURCE_TYPE_LABEL = Allgemein JDBC (benutzerdefiniert)
DATASOURCE_TYPE_DESCRIPTION = Ein benutzerdefinierter Verbindungstyp für generische JDBC
CONNECTION_JDBC_URL_LABEL = JDBC-URL
CONNECTION_JDBC_URL_DESCRIPTION = Die JDBC-URL, die für die Verbindungsherstellung zur Datenbank verwendet wird. Informationen zur Syntax der URL enthält die JDBC-Treiberdokumentation
CONNECTION_JDBC_PROPERTIES_LABEL = JDBC-Eigenschaften
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = Die JDBC-Eigenschaften, die die für die Verbindungsherstellung zur Datenbank verwendet werden (mehrzeiliges Format mit Schlüssel/Wert-Paaren). Unterstützte Eigenschaftswerte finden Sie in der Dokumentation für den JDBC-Treiber.
CONNECTION_USERNAME_LABEL = Benutzername
CONNECTION_USERNAME_DESCRIPTION = Benutzername
CONNECTION_PASSWORD_LABEL = Kennwort
CONNECTION_PASSWORD_DESCRIPTION = Kennwort
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = Unterstützung von Zeilenbegrenzungen
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = Gibt an, ob der Treiber Zeilenbegrenzungen in Anweisungen des Typs SELECT unterstützt
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = Keine
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = Präfix
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = Suffix
CONNECTION_ROW_LIMIT_PREFIX_LABEL = Zeilenbegrenzungspräfix
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = Das Präfix, das in einer Anweisung SELECT zur Angabe einer Zeilenbegrenzung verwendet werden soll, wenn 'row_limit_support' vorangestellt ist. Verwenden Sie ${row_limit}, um anzugeben, wo der Zeilenbegrenzungswert eingefügt werden soll.
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = Zeilenbegrenzungssuffix
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = Das Suffix, das in einer Anweisung SELECT zur Angabe einer Zeilenbegrenzung verwendet werden soll, wenn 'row_limit_support' nachgestellt ist. Verwenden Sie ${row_limit}, um anzugeben, wo der Zeilenbegrenzungswert eingefügt werden soll.
CONNECTION_SSL_CERTIFICATE_LABEL = SSL-Zertifikat
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = Das SSL-Zertifikat des vertrauenswürdigen Hosts, das nur erforderlich ist, wenn das Hostzertifikat nicht von einer bekannten Zertifizierungsstelle signiert wurde
SOURCE_SCHEMA_NAME_LABEL = Schemaname
SOURCE_SCHEMA_NAME_DESCRIPTION = Der Name des Schemas, das die Tabelle enthält, aus der gelesen werden soll
SOURCE_TABLE_NAME_LABEL = Tabellenname
SOURCE_TABLE_NAME_DESCRIPTION = Der Name der Tabelle, aus der gelesen werden soll
SOURCE_ROW_LIMIT_LABEL = Zeilenbegrenzung
SOURCE_ROW_LIMIT_DESCRIPTION = Maximale Anzahl von Zeilen, die zurückgegeben werden sollen
SOURCE_BYTE_LIMIT_LABEL = Byte-Grenzwert
SOURCE_BYTE_LIMIT_DESCRIPTION = Maximale Anzahl von Byte, die zurückgegeben werden sollen. Verwenden Sie einen der folgenden Suffixe: KB, MB, GB oder TB
SOURCE_SELECT_STATEMENT_LABEL = Anweisung auswählen

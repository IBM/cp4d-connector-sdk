DATASOURCE_TYPE_LABEL = Générique JDBC (personnalisé)
DATASOURCE_TYPE_DESCRIPTION = Un type de connexion personnalisé pour les connexions génériques JDBC
CONNECTION_JDBC_URL_LABEL = URL JDBC
CONNECTION_JDBC_URL_DESCRIPTION = URL JDBC utilisée pour se connecter à la base de données. Pour connaître la syntaxe de l'URL, voir la documentation du pilote JDBC
CONNECTION_JDBC_PROPERTIES_LABEL = Propriétés JDBC
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = Propriétés JDBC utilisées pour se connecter à la base de données (format clé=valeur multiligne). Pour connaître les valeurs de propriété prises en charge, voir la documentation du pilote JDBC.
CONNECTION_USERNAME_LABEL = Nom d'utilisateur
CONNECTION_USERNAME_DESCRIPTION = Nom d'utilisateur
CONNECTION_PASSWORD_LABEL = Mot de passe
CONNECTION_PASSWORD_DESCRIPTION = Mot de passe
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = Prise en charge d'un nombre limite de lignes
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = Permet d'indiquer si le pilote prend en charge un nombre limite de lignes dans une instruction SELECT
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = Aucun
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = Préfixe
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = Suffixe
CONNECTION_ROW_LIMIT_PREFIX_LABEL = Préfixe de nombre limite de lignes
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = Préfixe à utiliser dans une instruction SELECT afin d'indiquer un nombre limite de lignes avec le préfixe row_limit_support. Utilisez ${row_limit} pour indiquer où placer la valeur de limite de ligne
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = Suffixe de nombre limite de lignes
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = Suffixe à utiliser dans une instruction SELECT afin d'indiquer un nombre limite de lignes avec le suffixe row_limit_support. Utilisez ${row_limit} pour indiquer où placer la valeur de limite de ligne
CONNECTION_SSL_CERTIFICATE_LABEL = Certificat SSL
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = Le certificat SSL de l'hôte digne de confiance, qui n'est nécessaire que lorsque le certificat hôte n'a pas été signé par une autorité de certification connue
SOURCE_SCHEMA_NAME_LABEL = Nom du schéma
SOURCE_SCHEMA_NAME_DESCRIPTION = Nom du schéma qui contient la table à lire
SOURCE_TABLE_NAME_LABEL = Nom de la table
SOURCE_TABLE_NAME_DESCRIPTION = Nom de la table à lire
SOURCE_ROW_LIMIT_LABEL = Nombre limite de lignes
SOURCE_ROW_LIMIT_DESCRIPTION = Nombre maximal de lignes à renvoyer
SOURCE_BYTE_LIMIT_LABEL = Limite d'octets
SOURCE_BYTE_LIMIT_DESCRIPTION = Nombre maximal d'octets à renvoyer. Utilisez l'un de ces suffixes : Ko, Mo, Go ou To
SOURCE_SELECT_STATEMENT_LABEL = Instruction SELECT
SOURCE_SELECT_STATEMENT_DESCRIPTION = Instruction SQL SELECT permettant d'extraire des données de la table
TARGET_SCHEMA_NAME_LABEL = Nom du schéma
TARGET_SCHEMA_NAME_DESCRIPTION = Nom du schéma qui contient la table dans laquelle écrire
TARGET_TABLE_NAME_LABEL = Nom de la table
TARGET_TABLE_NAME_DESCRIPTION = Nom de la table dans laquelle écrire
TARGET_WRITE_MODE_LABEL = Mode d'écriture
TARGET_WRITE_MODE_DESCRIPTION = Mode d'écriture des enregistrements sur la table cible
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = Insérer
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = Mettre à jour
TARGET_WRITE_MODE_VALUE_UPDATE_STATEMENT_LABEL = Instruction UPDATE
TARGET_WRITE_MODE_VALUE_STATIC_STATEMENT_LABEL = Instruction statique
TARGET_KEY_COLUMN_NAMES_LABEL = Noms de colonne de clé
TARGET_KEY_COLUMN_NAMES_DESCRIPTION = Liste séparée par des virgules répertoriant des noms de colonne destinées à remplacer la clé primaire utilisée durant une mise à jour ou une fusion
TARGET_UPDATE_STATEMENT_LABEL = Instruction UPDATE
TARGET_UPDATE_STATEMENT_DESCRIPTION = L'instruction SQL INSERT, UPDATE, MERGE ou DELETE pour la mise à jour des données dans la table
TARGET_TABLE_ACTION_LABEL = Action de table
TARGET_TABLE_ACTION_DESCRIPTION = Action à exécuter sur la table cible afin de gérer les nouveaux jeux de données
TARGET_TABLE_ACTION_VALUE_APPEND_LABEL = Ajouter
TARGET_TABLE_ACTION_VALUE_REPLACE_LABEL = Remplacer
TARGET_TABLE_ACTION_VALUE_TRUNCATE_LABEL = Tronquer
TARGET_CREATE_STATEMENT_LABEL = Instruction CREATE
TARGET_CREATE_STATEMENT_DESCRIPTION = L'instruction DDL Create pour la création de la table cible
FILTER_INCLUDE_SYSTEM_LABEL = Inclure le système
FILTER_INCLUDE_SYSTEM_DESCRIPTION = Permet d'indiquer s'il convient d'inclure les objets système
FILTER_INCLUDE_TABLE_LABEL = Inclure les tables
FILTER_INCLUDE_TABLE_DESCRIPTION = Permet d'indiquer s'il convient d'inclure les tables
FILTER_INCLUDE_VIEW_LABEL = Inclure les vues
FILTER_INCLUDE_VIEW_DESCRIPTION = Permet d'indiquer s'il convient d'inclure les vues
FILTER_NAME_PATTERN_LABEL = Modèle de nom
FILTER_NAME_PATTERN_DESCRIPTION = Modèle de nom devant servir de filtre
FILTER_PRIMARY_KEY_LABEL = Inclure la liste des clés primaires
FILTER_PRIMARY_KEY_DESCRIPTION = Permet d'indiquer s'il convient d'inclure la liste de clés primaires
FILTER_SCHEMA_NAME_PATTERN_LABEL = Modèle de nom de schéma
FILTER_SCHEMA_NAME_PATTERN_DESCRIPTION = Modèle de nom à utiliser pour le filtrage de schéma
ASSET_TYPE_SCHEMA_LABEL = Schéma
ASSET_TYPE_TABLE_LABEL = Table
ASSET_TYPE_PRIMARY_KEY_LABEL = Clé primaire
ACTION_GET_RECORD_COUNT_DESCRIPTION = Obtenez le nombre de lignes contenues dans la table spécifiée
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = Nom du schéma
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = Nom du schéma contenant la table
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_LABEL = Nom de la table
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_DESCRIPTION = Nom de la table pour laquelle obtenir le nombre de lignes
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_LABEL = Nombre d'enregistrements
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_DESCRIPTION = Nombre de lignes disponibles

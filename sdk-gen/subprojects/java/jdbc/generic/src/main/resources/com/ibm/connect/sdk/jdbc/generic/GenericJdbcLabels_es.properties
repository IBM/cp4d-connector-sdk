DATASOURCE_TYPE_LABEL = Genérico JDBC (personalizado)
DATASOURCE_TYPE_DESCRIPTION = Un tipo de conexión personalizado para JDBC
CONNECTION_JDBC_URL_LABEL = URL de JDBC
CONNECTION_JDBC_URL_DESCRIPTION = El URL de JDBC utilizado para conectar con la base de datos. Consulte la documentación del controlador JDBC para obtener la sintaxis del URL
CONNECTION_JDBC_PROPERTIES_LABEL = Propiedades de JDBC
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = Las propiedades JDBC utilizadas para conectar con la base de datos (formato multilínea clave=valor). Consulte la documentación del controlador JDBC para obtener los valores de propiedades soportados.
CONNECTION_USERNAME_LABEL = Nombre de usuario
CONNECTION_USERNAME_DESCRIPTION = Nombre de usuario
CONNECTION_PASSWORD_LABEL = Contraseña
CONNECTION_PASSWORD_DESCRIPTION = Contraseña
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = Soporte de límite de fila
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = Indica si el controlador da soporte a un límite de fila en una sentencia select
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = Ninguna
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = Prefijo
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = Sufijo
CONNECTION_ROW_LIMIT_PREFIX_LABEL = Prefijo de límite de fila
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = Prefijo que se utiliza en una sentencia select para indicar un límite de fila cuando row_limit_support es el prefijo. Utilice ${row_limit} para indicar dónde colocar el valor de límite de fila
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = Sufijo de límite de fila
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = Sufijo que se utiliza en una sentencia select para indicar un límite de fila cuando row_limit_support es el sufijo. Utilice ${row_limit} para indicar dónde colocar el valor de límite de fila
CONNECTION_SSL_CERTIFICATE_LABEL = Certificado SSL
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = El certificado SSL del host en el que se debe confiar, que sólo es necesario cuando el certificado de host no ha sido firmado por una entidad emisora de certificados conocida.
SOURCE_SCHEMA_NAME_LABEL = Nombre de esquema.
SOURCE_SCHEMA_NAME_DESCRIPTION = El nombre del esquema que contiene la tabla desde la que se ha de leer
SOURCE_TABLE_NAME_LABEL = Nombre de tabla
SOURCE_TABLE_NAME_DESCRIPTION = El nombre de la tabla desde la que se ha de leer
SOURCE_ROW_LIMIT_LABEL = Límite de fila
SOURCE_ROW_LIMIT_DESCRIPTION = El número máximo de filas que se han de devolver
SOURCE_BYTE_LIMIT_LABEL = Límite de bytes
SOURCE_BYTE_LIMIT_DESCRIPTION = El número máximo de bytes que se han de devolver. Utilice cualquiera de estos sufijos: KB, MB, GB o TB
SOURCE_SELECT_STATEMENT_LABEL = Sentencia Select
SOURCE_SELECT_STATEMENT_DESCRIPTION = La sentencia SQL SELECT para recuperar datos de la tabla
TARGET_SCHEMA_NAME_LABEL = Nombre de esquema.
TARGET_SCHEMA_NAME_DESCRIPTION = El nombre del esquema que contiene la tabla en la que se ha de escribir
TARGET_TABLE_NAME_LABEL = Nombre de tabla
TARGET_TABLE_NAME_DESCRIPTION = El nombre de la tabla en la que se ha de escribir
TARGET_WRITE_MODE_LABEL = Modo escritura
TARGET_WRITE_MODE_DESCRIPTION = La modalidad para grabar registros en la tabla de destino
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = Insertar
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = Actualizar
TARGET_WRITE_MODE_VALUE_UPDATE_STATEMENT_LABEL = Sentencia Update
TARGET_WRITE_MODE_VALUE_STATIC_STATEMENT_LABEL = Sentencia estática
TARGET_KEY_COLUMN_NAMES_LABEL = Nombres de columna de clave
TARGET_KEY_COLUMN_NAMES_DESCRIPTION = Una lista separada por comas de nombres de columna para reemplazar la clave primaria utilizada durante una actualización o fusión
TARGET_UPDATE_STATEMENT_LABEL = Sentencia Update
TARGET_UPDATE_STATEMENT_DESCRIPTION = La sentencia SQL INSERT, UPDATE, MERGE o DELETE para actualizar los datos de la tabla
TARGET_TABLE_ACTION_LABEL = Acción de tabla
TARGET_TABLE_ACTION_DESCRIPTION = La acción que se ha de realizar en la tabla de destino para manejar el nuevo conjunto de datos
TARGET_TABLE_ACTION_VALUE_APPEND_LABEL = Añadir
TARGET_TABLE_ACTION_VALUE_REPLACE_LABEL = Sustituir
TARGET_TABLE_ACTION_VALUE_TRUNCATE_LABEL = Truncar
TARGET_CREATE_STATEMENT_LABEL = Sentencia Create
TARGET_CREATE_STATEMENT_DESCRIPTION = La sentencia Create DDL para crear la tabla destino
FILTER_INCLUDE_SYSTEM_LABEL = Incluir sistema
FILTER_INCLUDE_SYSTEM_DESCRIPTION = Si se han de incluir objetos del sistema
FILTER_INCLUDE_TABLE_LABEL = Incluir tablas
FILTER_INCLUDE_TABLE_DESCRIPTION = Si se han de incluir tablas
FILTER_INCLUDE_VIEW_LABEL = Incluir vistas
FILTER_INCLUDE_VIEW_DESCRIPTION = Si se han de incluir vistas
FILTER_NAME_PATTERN_LABEL = Patrón de nombre
FILTER_NAME_PATTERN_DESCRIPTION = El patrón de nombre por el que filtrar
FILTER_PRIMARY_KEY_LABEL = Incluir lista de claves primarias
FILTER_PRIMARY_KEY_DESCRIPTION = Si se ha de incluir una lista de claves primarias
FILTER_SCHEMA_NAME_PATTERN_LABEL = Patrón de nombre de esquema
FILTER_SCHEMA_NAME_PATTERN_DESCRIPTION = Un patrón de nombre para el filtrado de esquema
ASSET_TYPE_SCHEMA_LABEL = Esquema
ASSET_TYPE_TABLE_LABEL = Tabla
ASSET_TYPE_PRIMARY_KEY_LABEL = Clave primaria
ACTION_GET_RECORD_COUNT_DESCRIPTION = Obtiene el número de filas de la tabla especificada
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = Nombre de esquema.
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = El nombre del esquema que contiene la tabla
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_LABEL = Nombre de tabla
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_DESCRIPTION = El nombre de la tabla para la que obtener el número de filas
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_LABEL = Recuento de registros
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_DESCRIPTION = Número de filas disponibles

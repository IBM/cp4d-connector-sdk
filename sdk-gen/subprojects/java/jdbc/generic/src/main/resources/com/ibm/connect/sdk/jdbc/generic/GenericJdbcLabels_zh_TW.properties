DATASOURCE_TYPE_LABEL = 通用 JDBC (自訂)
DATASOURCE_TYPE_DESCRIPTION = 通用的自訂連線類型 JDBC
CONNECTION_JDBC_URL_LABEL = JDBC URL
CONNECTION_JDBC_URL_DESCRIPTION = 用來連接至資料庫的 JDBC URL。 請參閱 JDBC Driver 說明文件以取得 URL 的語法
CONNECTION_JDBC_PROPERTIES_LABEL = JDBC 內容
CONNECTION_JDBC_PROPERTIES_DESCRIPTION = 用來連接至資料庫的 JDBC 內容（採用多行索引鍵=值格式）。 請參閱 JDBC Driver 說明文件以取得支援的內容值
CONNECTION_USERNAME_LABEL = 使用者名稱
CONNECTION_USERNAME_DESCRIPTION = 使用者名稱
CONNECTION_PASSWORD_LABEL = 密碼
CONNECTION_PASSWORD_DESCRIPTION = 密碼
CONNECTION_ROW_LIMIT_SUPPORT_LABEL = 列限制支援
CONNECTION_ROW_LIMIT_SUPPORT_DESCRIPTION = 指出 Driver 是否支援在 select 陳述式中的列限制
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_NONE_LABEL = 無
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_PREFIX_LABEL = 字首
CONNECTION_ROW_LIMIT_SUPPORT_VALUE_SUFFIX_LABEL = 字尾
CONNECTION_ROW_LIMIT_PREFIX_LABEL = 列限制字首
CONNECTION_ROW_LIMIT_PREFIX_DESCRIPTION = 要在 select 陳述式中使用的字首，以在 row_limit_support 為字首時指出列限制。 使用 ${row_limit} 來指出放置列限制值的位置
CONNECTION_ROW_LIMIT_SUFFIX_LABEL = 列限制字尾
CONNECTION_ROW_LIMIT_SUFFIX_DESCRIPTION = 要在 select 陳述式中使用的字尾，以在 row_limit_support 為字尾時指出列限制。 使用 ${row_limit} 來指出放置列限制值的位置
CONNECTION_SSL_CERTIFICATE_LABEL = SSL 憑證
CONNECTION_SSL_CERTIFICATE_DESCRIPTION = 要信任之主機的 SSL 憑證，只有在主機憑證未由已知憑證管理中心簽署時才需要此憑證
SOURCE_SCHEMA_NAME_LABEL = 綱目名稱
SOURCE_SCHEMA_NAME_DESCRIPTION = 包含要從中讀取之表格的綱目名稱
SOURCE_TABLE_NAME_LABEL = 表格名稱
SOURCE_TABLE_NAME_DESCRIPTION = 要從中讀取的表格名稱
SOURCE_ROW_LIMIT_LABEL = 列限制
SOURCE_ROW_LIMIT_DESCRIPTION = 要傳回的列數目上限。
SOURCE_BYTE_LIMIT_LABEL = 位元組限制
SOURCE_BYTE_LIMIT_DESCRIPTION = 要傳回的位元組數目上限。 請使用以下任何字尾；KB、MB、GB 或 TB
SOURCE_SELECT_STATEMENT_LABEL = 選取陳述式
SOURCE_SELECT_STATEMENT_DESCRIPTION = 用於從表格中擷取資料的 SQL SELECT 陳述式
TARGET_SCHEMA_NAME_LABEL = 綱目名稱
TARGET_SCHEMA_NAME_DESCRIPTION = 包含要寫入之表格的綱目名稱
TARGET_TABLE_NAME_LABEL = 表格名稱
TARGET_TABLE_NAME_DESCRIPTION = 要寫入的表格名稱
TARGET_WRITE_MODE_LABEL = 寫入模式
TARGET_WRITE_MODE_DESCRIPTION = 用於將記錄寫入目標表格的模式
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = 插入
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = 更新
TARGET_WRITE_MODE_VALUE_UPDATE_STATEMENT_LABEL = 更新陳述式
TARGET_WRITE_MODE_VALUE_STATIC_STATEMENT_LABEL = 靜態陳述式
TARGET_KEY_COLUMN_NAMES_LABEL = 索引鍵直欄名稱
TARGET_KEY_COLUMN_NAMES_DESCRIPTION = 以逗點區隔的直欄名稱清單，以置換在更新或合併期間使用的主要索引鍵
TARGET_UPDATE_STATEMENT_LABEL = 更新陳述式
TARGET_UPDATE_STATEMENT_DESCRIPTION = 用於更新資料表中資料的 SQL INSERT、UPDATE、MERGE 或 DELETE 語句
TARGET_TABLE_ACTION_LABEL = 表格動作
TARGET_TABLE_ACTION_DESCRIPTION = 要對目標表格採取的動作，以處理新的資料集
TARGET_TABLE_ACTION_VALUE_APPEND_LABEL = 附加
TARGET_TABLE_ACTION_VALUE_REPLACE_LABEL = 取代
TARGET_TABLE_ACTION_VALUE_TRUNCATE_LABEL = 截斷
TARGET_CREATE_STATEMENT_LABEL = 建立陳述式
TARGET_CREATE_STATEMENT_DESCRIPTION = 建立目標資料表的 Create DDL 語句
FILTER_INCLUDE_SYSTEM_LABEL = 包含系統
FILTER_INCLUDE_SYSTEM_DESCRIPTION = 是否要包含系統物件
FILTER_INCLUDE_TABLE_LABEL = 包含表格
FILTER_INCLUDE_TABLE_DESCRIPTION = 是否要包含表格
FILTER_INCLUDE_VIEW_LABEL = 包含視圖
FILTER_INCLUDE_VIEW_DESCRIPTION = 是否要包含視圖
FILTER_NAME_PATTERN_LABEL = 名稱型樣
FILTER_NAME_PATTERN_DESCRIPTION = 要過濾的名稱型樣
FILTER_PRIMARY_KEY_LABEL = 包含主索引鍵清單
FILTER_PRIMARY_KEY_DESCRIPTION = 是否要包含主要索引鍵清單
FILTER_SCHEMA_NAME_PATTERN_LABEL = 綱目名稱型樣
FILTER_SCHEMA_NAME_PATTERN_DESCRIPTION = 用於綱目過濾的名稱型樣
ASSET_TYPE_SCHEMA_LABEL = 綱目
ASSET_TYPE_TABLE_LABEL = 表格
ASSET_TYPE_PRIMARY_KEY_LABEL = 主要索引鍵
ACTION_GET_RECORD_COUNT_DESCRIPTION = 取得指定表格中的列數
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = 綱目名稱
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = 包含表格之綱目的名稱
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_LABEL = 表格名稱
ACTION_GET_RECORD_COUNT_INPUT_TABLE_NAME_DESCRIPTION = 要針對其取得列數的表格名稱
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_LABEL = 記錄計數
ACTION_GET_RECORD_COUNT_OUTPUT_RECORD_COUNT_DESCRIPTION = 可用的列數

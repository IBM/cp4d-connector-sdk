ACTION_GET_RECORD_COUNT_DESCRIPTION = 지정된 테이블에 있는 행의 수 얻기
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_LABEL = 스키마 이름
ACTION_GET_RECORD_COUNT_INPUT_SCHEMA_NAME_DESCRIPTION = 테이블이 포함된 스키마의 이름입니다.

SOURCE_SELECT_STATEMENT_DESCRIPTION = 테이블에서 데이터를 검색하는 데 필요한 SQL SELECT문
TARGET_SCHEMA_NAME_LABEL = 스키마 이름
TARGET_SCHEMA_NAME_DESCRIPTION = 쓸 테이블을 포함하는 스키마의 이름
TARGET_TABLE_NAME_LABEL = 테이블 이름
TARGET_TABLE_NAME_DESCRIPTION = 쓸 테이블의 이름
TARGET_WRITE_MODE_LABEL = 쓰기 모드
TARGET_WRITE_MODE_DESCRIPTION = 대상 테이블에 레코드를 쓰는 모드입니다.
TARGET_WRITE_MODE_VALUE_INSERT_LABEL = 삽입
TARGET_WRITE_MODE_VALUE_UPDATE_LABEL = 업데이트

import groovy.json.JsonSlurper

/**
 * Gradle task to generate comprehensive TestPropertyValidation.java for JDBC connectors
 *
 * Usage: ./gradlew generateJdbcTests -PdslFile=DSL-jdbc.json -PconnectorDir=subprojects/jdbc_mydb
 */

task generateJdbcTests {
  description = 'Generates comprehensive TestPropertyValidation.java for JDBC connector'
  group = 'connector'

  doLast {
    // Get parameters
    def dslFilePath = project.hasProperty('dslFile') ? project.property('dslFile') : 'DSL-jdbc.json'
    def connectorDir = project.hasProperty('connectorDir') ? project.property('connectorDir') : null

    if (!connectorDir) {
      throw new GradleException("Please specify connector directory: -PconnectorDir=subprojects/jdbc_mydb")
    }

    def dslFile = new File(project.rootDir, dslFilePath)
    if (!dslFile.exists()) {
      throw new GradleException("DSL file not found: ${dslFile.absolutePath}")
    }

    def connectorPath = new File(project.rootDir, connectorDir)
    if (!connectorPath.exists()) {
      throw new GradleException("Connector directory not found: ${connectorPath.absolutePath}")
    }

    println "Reading DSL configuration from: ${dslFile.absolutePath}"
    def dsl = new JsonSlurper().parse(dslFile)

    // Extract connector name and package
    def connectorName = connectorPath.name
    def packageName = findPackageName(connectorPath, connectorName)

    if (!packageName) {
      throw new GradleException("Could not determine package name for connector: ${connectorName}")
    }

    println "Generating tests for connector: ${connectorName}"
    println "Package: ${packageName}"

    // Generate test file
    def testContent = generateTestFile(connectorName, packageName, dsl)

    // Write test file
    def testDir = new File(connectorPath, "src/test/java/${packageName.replace('.', '/')}")
    testDir.mkdirs()

    def testFile = new File(testDir, "TestPropertyValidation.java")
    testFile.text = testContent

    println "✅ Generated test file: ${testFile.absolutePath}"
    println "\nNext steps:"
    println "  1. Review the generated test file"
    println "  2. Update test connection properties with real database credentials"
    println "  3. Run tests: ./gradlew :${connectorName}:test"
  }
}

def findPackageName(File connectorPath, String connectorName) {
  // Look for existing Java files to extract package name
  def srcDir = new File(connectorPath, "src/main/java")
  def javaFiles = []

  srcDir.eachFileRecurse { file ->
    if (file.name.endsWith('.java')) {
      javaFiles << file
    }
  }

  if (javaFiles.isEmpty()) {
    return null
  }

  // Extract package from first Java file
  def firstFile = javaFiles[0]
  def content = firstFile.text
  def matcher = content =~ /package\s+([\w.]+);/

  if (matcher.find()) {
    return matcher.group(1)
  }

  return null
}


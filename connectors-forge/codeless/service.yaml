apiVersion: v1
kind: Service
metadata:
  name: cf-flight-connector-service
  namespace: connectorsforge
  labels:
    app: cf-flight-connector
spec:
  type: ClusterIP
  selector:
    app: cf-flight-connector
  ports:
  - name: grpc
    port: 9443
    targetPort: 9443
    protocol: TCP
    appProtocol: grpc

